<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerie Preview — travail-pour-toi.com</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06101f; color: #D6D9F0; font-family: 'Outfit', sans-serif; padding: 40px 24px; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 32px; text-align: center; margin-bottom: 8px; background: linear-gradient(135deg, #a78bfa, #4FA3FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { text-align: center; color: #8891B8; font-size: 14px; margin-bottom: 40px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; max-width: 1400px; margin: 0 auto; }
  .card { background: rgba(10,22,40,0.8); border: 1px solid rgba(123,92,255,0.15); border-radius: 16px; overflow: hidden; transition: all 0.3s; }
  .card:hover { border-color: rgba(123,92,255,0.4); transform: translateY(-4px); box-shadow: 0 16px 40px rgba(123,92,255,0.1); }
  .card img { width: 100%; height: 360px; object-fit: cover; display: block; }
  .card-info { padding: 14px 18px; }
  .card-name { font-size: 15px; font-weight: 600; color: #fff; }
  .card-size { font-size: 12px; color: #8891B8; margin-top: 4px; }
</style>
</head>
<body>
<h1>Galerie Preview</h1>
<p class="sub">Toutes les images disponibles pour travail-pour-toi.com — 21 fichiers</p>
<div class="grid" id="gallery"></div>
<script>
const images = [
  { name: 'heureuse.png', size: '2.5 MB — 1536x1024', dim: 'Photo landscape Diane' },
  { name: 'personal-image-2.png', size: '2.5 MB — 1536x1024', dim: 'Photo landscape Diane' },
  { name: 'NyXia.png', size: '1.3 MB — 1080x1080', dim: 'Logo/Avatar carre' },
  { name: 'NyXia-26.png', size: '1.9 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: 'NyXia-33.png', size: '1.9 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: 'TravailDureNyxia.png', size: '2.3 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: 'FavIcon.png', size: '699 KB — 1024x1536', dim: 'Favicon' },
  { name: '1.png', size: '927 KB — 1024x1536', dim: 'Visuel portrait' },
  { name: '2.png', size: '2.4 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: '4.png', size: '2.1 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: '5.png', size: '1.9 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: '6.png', size: '1.6 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: '9.png', size: '1.5 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: '14.png', size: '1.3 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: '15.png', size: '927 KB — 1024x1536', dim: 'Visuel portrait' },
  { name: 'NyXia-23.png', size: '2.4 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: 'NyXia-25.png', size: '2.7 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: 'NyXia-27gauche.png', size: '2.0 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: 'NyXia-27droite.png', size: '2.0 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: 'NyXia-34.png', size: '1.9 MB — 1024x1536', dim: 'Visuel portrait' },
  { name: 'NyXia-35.png', size: '2.1 MB — 1024x1536', dim: 'Visuel portrait' }
];
const gallery = document.getElementById('gallery');
images.forEach(img => {
  gallery.innerHTML += '<div class="card"><img src="images/' + img.name + '" alt="' + img.name + '" loading="lazy"><div class="card-info"><div class="card-name">' + img.name + '</div><div class="card-size">' + img.size + ' — ' + img.dim + '</div></div></div>';
});
</script>
</body>
</html>
