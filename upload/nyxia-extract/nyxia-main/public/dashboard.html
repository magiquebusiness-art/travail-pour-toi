<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>NyXia — Mon agente IA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', sans-serif; background: #000; color: #fff; overflow: hidden; }

/* ── LOGIN ─────────────────────────── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; background: #000;
}
.login-card {
  width: 360px; max-width: 90vw; padding: 40px 32px;
  background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 16px;
}
.login-logo {
  width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 20px;
  display: block; object-fit: cover;
  box-shadow: 0 0 30px rgba(123, 92, 255, 0.15);
  border: 2px solid #1a1a1a;
}
.login-card h2 {
  text-align: center; font-size: 20px; font-weight: 600;
  margin-bottom: 4px; color: #fff;
}
.login-card .sub { text-align: center; font-size: 13px; color: #555; margin-bottom: 28px; }
.login-card input {
  width: 100%; padding: 12px 16px; margin-bottom: 10px;
  background: #111; border: 1px solid #222; border-radius: 10px;
  color: #fff; font-size: 14px; font-family: inherit; outline: none;
  transition: border-color .2s;
}
.login-card input:focus { border-color: #7B5CFF; }
.login-card input::placeholder { color: #333; }
.login-btn {
  width: 100%; padding: 12px; background: #7B5CFF; border: none; border-radius: 10px;
  color: #fff; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
  margin-top: 4px; transition: background .15s;
}
.login-btn:hover { background: #6A4CEE; }
.login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.login-err { color: #FF5252; font-size: 12px; text-align: center; margin-top: 10px; min-height: 18px; }

/* ── CHAT LAYOUT ─────────────────── */
#chat-screen {
  display: none; height: 100vh; height: 100dvh;
  flex-direction: column;
}

.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  height: 54px; padding: 0 16px;
  background: #000; border-bottom: 1px solid #111;
  flex-shrink: 0;
}
.top-bar-left { display: flex; align-items: center; gap: 10px; }
.top-bar-avatar {
  width: 34px; height: 34px; border-radius: 50%; object-fit: cover;
  border: 1.5px solid #1a1a1a;
}
.top-bar-info { display: flex; flex-direction: column; }
.top-bar-name { font-size: 14px; font-weight: 600; line-height: 1.2; }
.top-bar-status {
  font-size: 11px; color: #00E676; display: flex; align-items: center; gap: 5px; line-height: 1.2;
}
.top-bar-status::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%; background: #00E676;
  display: inline-block;
}
.top-bar-right { display: flex; align-items: center; gap: 8px; }
.top-bar-btn {
  background: none; border: 1px solid #222; color: #555; font-size: 11px;
  padding: 5px 10px; border-radius: 6px; cursor: pointer; font-family: inherit;
  transition: all .15s; display: flex; align-items: center; gap: 4px;
}
.top-bar-btn:hover { border-color: #444; color: #aaa; }
.top-bar-btn.danger:hover { border-color: #FF5252; color: #FF5252; }
.top-bar-btn.success:hover { border-color: #00E676; color: #00E676; }
.user-badge {
  font-size: 11px; color: #7B5CFF; background: rgba(123,92,255,0.1);
  padding: 3px 8px; border-radius: 6px; font-weight: 500;
}

/* ── CHAT AREA ─────────────────── */
.chat-area {
  flex: 1; overflow-y: auto; padding: 16px 16px 8px;
  display: flex; flex-direction: column;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 2px; }

/* Welcome */
.welcome-msg {
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 20px 30px; text-align: center;
}
.welcome-msg img {
  width: 90px; height: 90px; border-radius: 50%; object-fit: cover;
  margin-bottom: 16px;
  box-shadow: 0 0 40px rgba(123, 92, 255, 0.15);
  border: 2px solid #1a1a1a;
}
.welcome-msg h3 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.welcome-msg p { font-size: 13px; color: #555; max-width: 350px; line-height: 1.5; }
.welcome-chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 18px; }
.chip {
  padding: 7px 14px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px;
  font-size: 12px; color: #888; cursor: pointer; font-family: inherit; transition: all .15s;
}
.chip:hover { background: #111; border-color: #333; color: #ccc; }

/* Messages */
.msg { display: flex; gap: 8px; max-width: 80%; margin-bottom: 4px; animation: msgIn .2s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-av {
  width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
  overflow: hidden; margin-top: 2px;
}
.msg-av img { width: 100%; height: 100%; object-fit: cover; }
.msg.user .msg-av {
  background: #1a1025; display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #7B5CFF;
}

.msg-body { max-width: calc(100% - 36px); }
.msg-bubble {
  padding: 10px 14px; border-radius: 16px; font-size: 13.5px;
  line-height: 1.55; word-wrap: break-word;
}
.msg.bot .msg-bubble {
  background: #0a0a0a; color: #ccc; border-top-left-radius: 4px;
  border: 1px solid #111;
}
.msg.user .msg-bubble {
  background: #7B5CFF; color: #fff; border-top-right-radius: 4px;
}
.msg-bubble p { margin-bottom: 4px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble code { background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 4px; font-size: 12px; font-family: 'SF Mono', monospace; }
.msg-bubble pre { background: #080808; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 6px 0; font-size: 12px; font-family: 'SF Mono', monospace; border: 1px solid #1a1a1a; }
.msg-bubble strong { color: #fff; }
.msg-bubble ul, .msg-bubble ol { margin: 4px 0; padding-left: 16px; }
.msg-bubble li { margin-bottom: 2px; }
.msg-time { font-size: 10px; color: #333; margin-top: 3px; padding: 0 2px; }
.msg.bot .msg-time { text-align: left; }
.msg.user .msg-time { text-align: right; }

/* Tool results */
.tool-row {
  display: flex; gap: 5px; flex-wrap: wrap;
  margin: 2px 0 4px 36px;
}
.tool-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  background: #080808; border: 1px solid #1a1a1a; color: #444;
}
.tool-tag.ok { color: #00C853; border-color: #0a2a0a; }

/* Typing indicator — INSIDE chat area */
.typing-row {
  display: none; align-self: flex-start;
  gap: 8px; align-items: flex-end; margin-bottom: 4px;
}
.typing-row.on { display: flex; }
.typing-av { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
.typing-av img { width: 100%; height: 100%; object-fit: cover; }
.typing-bubble {
  padding: 10px 14px; background: #0a0a0a; border-radius: 16px; border-top-left-radius: 4px;
  border: 1px solid #111; font-size: 11px; color: #444;
  display: flex; align-items: center; gap: 4px;
}
.typing-bubble .dots { display: inline-flex; gap: 3px; }
.typing-bubble .dots i {
  width: 4px; height: 4px; border-radius: 50%; background: #444;
  animation: pulse 1.4s infinite;
}
.typing-bubble .dots i:nth-child(2) { animation-delay: .2s; }
.typing-bubble .dots i:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,60%,100% { opacity:.3; transform:scale(.8); } 30% { opacity:1; transform:scale(1); } }
.typing-timer { margin-left: 6px; color: #333; }

/* System message (backup, etc.) */
.sys-msg {
  align-self: center; padding: 8px 16px; margin: 8px 0;
  background: rgba(123,92,255,0.05); border: 1px solid rgba(123,92,255,0.15);
  border-radius: 8px; font-size: 11px; color: #7B5CFF;
  text-align: center; max-width: 90%;
}

/* Input */
.input-area {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 10px 16px 16px; background: #000;
  flex-shrink: 0;
}
.input-area textarea {
  flex: 1; padding: 10px 14px; background: #0a0a0a; border: 1px solid #1a1a1a;
  border-radius: 12px; color: #fff; font-size: 14px; font-family: inherit;
  outline: none; resize: none; max-height: 100px; min-height: 40px; line-height: 1.4;
  transition: border-color .2s;
}
.input-area textarea:focus { border-color: #222; }
.input-area textarea::placeholder { color: #333; }
.send-btn {
  width: 40px; height: 40px; border-radius: 10px; background: #7B5CFF;
  border: none; color: #fff; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.send-btn:hover { background: #6A4CEE; transform: scale(1.05); }
.send-btn:disabled { opacity: .2; cursor: not-allowed; transform: none; }

/* Backup panel */
.backup-panel {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8); z-index: 100;
  align-items: center; justify-content: center;
}
.backup-panel.open { display: flex; }
.backup-card {
  width: 420px; max-width: 92vw; max-height: 80vh; overflow-y: auto;
  background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 16px;
  padding: 24px;
}
.backup-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.backup-card .backup-sub { font-size: 12px; color: #555; margin-bottom: 16px; }
.backup-actions { display: flex; gap: 8px; margin-bottom: 16px; }
.backup-actions button {
  flex: 1; padding: 10px; border-radius: 8px; font-size: 12px;
  font-family: inherit; cursor: pointer; transition: all .15s; font-weight: 500;
}
.backup-actions .btn-save { background: #7B5CFF; color: #fff; border: none; }
.backup-actions .btn-save:hover { background: #6A4CEE; }
.backup-actions .btn-close { background: none; color: #888; border: 1px solid #222; }
.backup-actions .btn-close:hover { border-color: #444; color: #fff; }
.backup-list { list-style: none; }
.backup-list li {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border: 1px solid #111; border-radius: 8px;
  margin-bottom: 6px; font-size: 12px;
}
.backup-list li .b-date { color: #888; }
.backup-list li .b-keys { color: #555; font-size: 11px; }
.backup-list li button {
  background: none; border: 1px solid #222; color: #555; padding: 4px 8px;
  border-radius: 4px; font-size: 11px; cursor: pointer; font-family: inherit;
}
.backup-list li button:hover { border-color: #00E676; color: #00E676; }
.backup-empty { color: #444; font-size: 12px; text-align: center; padding: 20px; }

@media (max-width: 640px) {
  .msg { max-width: 88%; }
  .user-badge { display: none; }
  .chat-area { padding: 12px; }
  .input-area { padding: 8px 10px 12px; }
  .welcome-msg { padding: 24px 16px 20px; }
  .welcome-msg img { width: 70px; height: 70px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <img class="login-logo" src="NyXia.png" alt="NyXia">
    <h2>NyXia</h2>
    <p class="sub">Espace prive de Diane</p>
    <input type="email" id="login-email" placeholder="Email" autocomplete="email">
    <input type="password" id="login-pass" placeholder="Mot de passe" autocomplete="current-password">
    <button class="login-btn" id="login-btn" onclick="doLogin()">Connexion</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div class="top-bar">
    <div class="top-bar-left">
      <img class="top-bar-avatar" src="NyXia.png" alt="NyXia">
      <div class="top-bar-info">
        <div class="top-bar-name">NyXia</div>
        <div class="top-bar-status">En ligne</div>
      </div>
    </div>
    <div class="top-bar-right">
      <span class="user-badge">Diane</span>
      <button class="top-bar-btn success" onclick="openBackup()">💾</button>
      <button class="top-bar-btn danger" onclick="doLogout()">Quitter</button>
    </div>
  </div>

  <div class="chat-area" id="chat">
    <div class="typing-row" id="typing">
      <div class="typing-av"><img src="NyXia.png" alt="N"></div>
      <div class="typing-bubble">
        <span class="dots"><i></i><i></i><i></i></span>
        <span class="typing-timer" id="typing-timer"></span>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="inp" placeholder="Ecris quelque chose..." rows="1" onkeydown="onKey(event)"></textarea>
    <button class="send-btn" id="send" onclick="send()">&#10148;</button>
  </div>
</div>

<!-- BACKUP PANEL -->
<div class="backup-panel" id="backup-panel">
  <div class="backup-card">
    <h3>Sauvegardes NyXia</h3>
    <p class="backup-sub">Protege la memoire et les donnees de NyXia</p>
    <div class="backup-actions">
      <button class="btn-save" onclick="createBackup()">Creer une sauvegarde</button>
      <button class="btn-close" onclick="closeBackup()">Fermer</button>
    </div>
    <ul class="backup-list" id="backup-list"></ul>
  </div>
</div>

<script>
const API = '/api';
let tk = localStorage.getItem('nx_tk');
let usr = JSON.parse(localStorage.getItem('nx_u') || 'null');
let msgs = JSON.parse(localStorage.getItem('nx_m') || '[]');

// ── API helper avec auth automatique ──
async function apiFetch(path, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...options.headers };
  if (tk) headers['Authorization'] = 'Bearer ' + tk;
  const res = await fetch(API + path, { ...options, headers });
  if (res.status === 401) { doLogout(); throw new Error('Session expiree'); }
  return res;
}

// Vérifie le token au chargement
if (tk && usr) {
  // Token valide, on valide en arrière-plan
  fetch(API + '/status', { headers: { 'Authorization': 'Bearer ' + tk } })
    .then(r => { if (r.ok) showChat(); else doLogout(); })
    .catch(() => showChat());
}

// ── LOGIN ──
async function doLogin() {
  const em = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pass').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  if (!em || !pw) { err.textContent = 'Remplis les deux champs'; return; }
  btn.disabled = true; err.textContent = '';

  try {
    const r = await fetch(API + '/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: em, password: pw})
    });
    const d = await r.json();

    if (d.success && d.token) {
      tk = d.token; usr = d.user;
      localStorage.setItem('nx_tk', tk);
      localStorage.setItem('nx_u', JSON.stringify(usr));
      msgs = []; localStorage.removeItem('nx_m');
      showChat();
    } else {
      err.textContent = d.message || d.error || 'Identifiants incorrects';
    }
  } catch(e) {
    err.textContent = 'Erreur de connexion';
  }
  btn.disabled = false;
}

function doLogout() {
  tk = null; usr = null; msgs = [];
  localStorage.removeItem('nx_tk');
  localStorage.removeItem('nx_u');
  localStorage.removeItem('nx_m');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('chat-screen').style.display = 'none';
}

// ── CHAT DISPLAY ──
function showChat() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  const c = document.getElementById('chat');
  const typing = document.getElementById('typing');
  c.innerHTML = '';
  c.appendChild(typing);

  if (msgs.length === 0) {
    c.insertAdjacentHTML('afterbegin', welcomeHTML());
  } else {
    msgs.forEach(m => m.role === 'user' ? addUser(m.content, false) : addBot(m.content, false));
  }
  scroll();
}

function welcomeHTML() {
  return `<div class="welcome-msg">
    <img src="NyXia.png" alt="NyXia">
    <h3>Salut Diane</h3>
    <p>Pret a travailler ensemble. Dis-moi ce que tu veux creer ou modifier.</p>
    <div class="welcome-chips">
      <div class="chip" onclick="quick('Statut de mes projets')">Mes projets</div>
      <div class="chip" onclick="quick('Montre-moi mes tokens')">Mes tokens</div>
      <div class="chip" onclick="quick('Aide-moi a coder quelque chose')">Coder</div>
    </div>
  </div>`;
}

// ── MESSAGES ──
function quick(t) { document.getElementById('inp').value = t; send(); }

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  const ta = e.target;
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
}

function scroll() {
  const c = document.getElementById('chat');
  requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
}

function fmt(t) {
  if (!t) return '';
  t = t.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

function now() {
  return new Date().toLocaleTimeString('fr-CA', {hour:'2-digit', minute:'2-digit'});
}

function addSysMsg(text) {
  const c = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'sys-msg';
  d.textContent = text;
  c.appendChild(d);
  scroll();
}

function addUser(text, save = true) {
  const w = document.querySelector('.welcome-msg');
  if (w) w.remove();
  const c = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="msg-av">D</div><div class="msg-body"><div class="msg-bubble">${fmt(text)}</div><div class="msg-time">${now()}</div></div>`;
  c.appendChild(d);
  if (save) {
    msgs.push({role:'user', content:text});
    localStorage.setItem('nx_m', JSON.stringify(msgs.slice(-50)));
  }
  scroll();
}

function addBot(text, save = true) {
  const c = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `<div class="msg-av"><img src="NyXia.png" alt="N"></div><div class="msg-body"><div class="msg-bubble">${fmt(text)}</div><div class="msg-time">${now()}</div></div>`;
  c.appendChild(d);
  if (save) {
    msgs.push({role:'assistant', content:text});
    localStorage.setItem('nx_m', JSON.stringify(msgs.slice(-50)));
  }
  scroll();
}

function addTools(tools) {
  if (!tools?.length) return;
  const c = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'tool-row';
  d.innerHTML = tools.map(t =>
    `<span class="tool-tag ${t.result?.success !== false ? 'ok' : ''}">${t.toolName}</span>`
  ).join('');
  c.appendChild(d);
  scroll();
}

// ── SEND ──
async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  inp.style.height = 'auto';
  addUser(text);

  const typingEl = document.getElementById('typing');
  const timerEl = document.getElementById('typing-timer');
  typingEl.classList.add('on');
  document.getElementById('send').disabled = true;
  scroll();

  const t0 = Date.now();
  const timer = setInterval(() => {
    const s = Math.round((Date.now() - t0) / 1000);
    timerEl.textContent = s > 3 ? `${s}s` : '';
  }, 1000);

  try {
    const r = await apiFetch('/chat', {
      method: 'POST',
      body: JSON.stringify({messages: msgs})
    });
    const d = await r.json();

    clearInterval(timer);
    typingEl.classList.remove('on');
    timerEl.textContent = '';

    if (d.error) {
      addBot('Erreur : ' + d.error);
    } else {
      if (d.toolResults?.length) addTools(d.toolResults);
      if (d.content) addBot(d.content);
    }
  } catch(e) {
    clearInterval(timer);
    typingEl.classList.remove('on');
    timerEl.textContent = '';
    if (e.message !== 'Session expiree') addBot('Erreur de connexion.');
  }
  document.getElementById('send').disabled = false;
  inp.focus();
}

// ── BACKUP ──
async function openBackup() {
  document.getElementById('backup-panel').classList.add('open');
  await loadBackups();
}

function closeBackup() {
  document.getElementById('backup-panel').classList.remove('open');
}

async function createBackup() {
  try {
    const r = await apiFetch('/backup', { method: 'POST' });
    const d = await r.json();
    if (d.success) {
      addSysMsg('Sauvegarde creee — ' + d.keys_saved + ' cles protegees');
      await loadBackups();
    } else {
      addBot('Erreur backup : ' + (d.error || 'inconnu'));
    }
  } catch(e) {
    addBot('Erreur de sauvegarde');
  }
}

async function loadBackups() {
  const list = document.getElementById('backup-list');
  try {
    const r = await apiFetch('/backup/list');
    const d = await r.json();
    if (d.success && d.backups.length > 0) {
      list.innerHTML = d.backups.map(b => {
        const date = new Date(b.created).toLocaleDateString('fr-CA', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
        return `<li>
          <div><span class="b-date">${date}</span> <span class="b-keys">${b.keys} cles</span></div>
          <button onclick="downloadBackup('${b.id}')">Telecharger</button>
        </li>`;
      }).join('');
    } else {
      list.innerHTML = '<li class="backup-empty">Aucune sauvegarde pour le moment</li>';
    }
  } catch(e) {
    list.innerHTML = '<li class="backup-empty">Erreur de chargement</li>';
  }
}

async function downloadBackup(backupId) {
  try {
    const r = await apiFetch('/backup/download/' + backupId);
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `nyxia-backup-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    addBot('Erreur de telechargement');
  }
}

// Enter key on password field
document.getElementById('login-pass')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
